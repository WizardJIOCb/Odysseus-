server {
    server_name odysseus.xedoc.ru;

    root /var/www/odysseus.xedoc.ru;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/odysseus.xedoc.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/odysseus.xedoc.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = odysseus.xedoc.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name odysseus.xedoc.ru;
    return 404; # managed by Certbot


}